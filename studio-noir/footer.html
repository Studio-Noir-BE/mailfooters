<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Footer - Studio Noir</title>
</head>
<body style="margin: 0; padding: 20px; background: #ffffff;">

  <table cellpadding="0" cellspacing="0" border="0"
         style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #000000; max-width: 500px;">

    <!-- Greeting row -->
    <tr>
      <td style="padding-bottom: 20px; font-size: 14px; color: #000000;">
        Met vriendelijke groeten,
      </td>
    </tr>

    <!-- Person row: photo + name/title -->
    <tr>
      <td style="padding-bottom: 20px;">
        <table cellpadding="0" cellspacing="0" border="0">
          <tr>
            <!-- Profile photo (circular) -->
            <td style="vertical-align: middle; padding-right: 14px;">              
              <img
                src="https://raw.githubusercontent.com/studio-noir-be/mailfooters/main/studio-noir/person.png"
                width="60"
                height="60"
                alt="Lennon Puype"
                style="
                  display: block;
                  width: 60px;
                  height: 60px;
                  border-radius: 50%;
                  object-fit: cover;
                "
              >
            </td>

            <td style="vertical-align: middle;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="
                    font-family: Arial, Helvetica, sans-serif;
                    font-size: 15px;
                    font-weight: bold;
                    color: #000000;
                    padding-bottom: 3px;
                    white-space: nowrap;
                  ">
                    Lennon Puype
                  </td>
                </tr>
                <tr>
                  <td style="
                    font-family: Arial, Helvetica, sans-serif;
                    font-size: 13px;
                    color: #333333;
                    white-space: nowrap;
                  ">
                    Zaakvoerder &amp; Developer
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <td>
        <table cellpadding="0" cellspacing="0" border="0">
          <tr>
            <!-- Studio Noir logo -->
            <td style="vertical-align: middle; padding-right: 20px;">              
              <img
                src="https://raw.githubusercontent.com/studio-noir-be/mailfooters/main/studio-noir/logo.png"
                width="160"
                height="120"
                alt="Studio Noir"
                style="display: block; width: 160px; height: 120px; object-fit: contain;"
              >
            </td>

            <!-- Vertical divider: 2px wide, #EFFF10, ~80% of row height -->
            <td style="vertical-align: middle; padding: 0;">
              <div style="width: 2px; height: 80px; background-color: #EFFF10;"></div>
            </td>

            <!-- Contact info -->
            <td style="vertical-align: middle; padding-left: 20px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-bottom: 6px;">
                    <a
                      href="mailto:info@studionoir.be"
                      style="
                        font-family: Arial, Helvetica, sans-serif;
                        font-size: 13px;
                        color: #000000;
                        text-decoration: none;
                        font-weight: bold;
                      "
                    >info@studionoir.be</a>
                  </td>
                </tr>
                <tr>
                  <td>
                    <a
                      href="https://www.studionoir.be"
                      style="
                        font-family: Arial, Helvetica, sans-serif;
                        font-size: 13px;
                        color: #000000;
                        text-decoration: none;
                        font-weight: bold;
                      "
                    >www.studionoir.be</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>

  </table>

</body>
</html>
